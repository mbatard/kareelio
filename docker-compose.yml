services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kareelio}
      POSTGRES_USER: ${POSTGRES_USER:-kareelio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kareelio} -d ${POSTGRES_DB:-kareelio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-kareelio}
      POSTGRES_USER: ${POSTGRES_USER:-kareelio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-in-production}
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_SAMESITE: "lax"
      SESSION_DURATION_HOURS: "72"
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@kareelio.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
      CORS_ORIGIN: http://localhost:5173
      DB_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
