apiVersion: v1
kind: ConfigMap
metadata:
  name: kareelio-config
  namespace: kareelio
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "kareelio"
  SERVER_PORT: "8080"
  SESSION_COOKIE_SAMESITE: "strict"
  SESSION_DURATION_HOURS: "72"
  DB_MIGRATE: "true"
  CORS_ORIGIN: "https://kareelio.example.com"
  APP_PUBLIC_URL: "https://app.kareelio.fr"
  REGISTRATION_ENABLED: "true"
  VERIFICATION_TOKEN_TTL_HOURS: "24"
  SMTP_PORT: "587"
  SMTP_FROM: "noreply@kareelio.fr"
