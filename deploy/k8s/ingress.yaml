apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kareelio-ingress
  namespace: kareelio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: kareelio-security-headers@kubernetescrd,kareelio-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kareelio.example.com
      secretName: kareelio-tls
  rules:
    - host: kareelio.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
