apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kareelio-ingressroute
  namespace: kareelio
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kareelio.example.com`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      middlewares:
        - name: security-headers
        - name: rate-limit
      services:
        - name: backend
          port: 8080
    - match: Host(`kareelio.example.com`) && PathPrefix(`/`)
      kind: Rule
      priority: 1
      middlewares:
        - name: security-headers
        - name: rate-limit
      services:
        - name: frontend
          port: 80
  tls:
    secretName: kareelio-tls
